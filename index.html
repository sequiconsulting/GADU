<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G.A.D.U. - Gestione Associazioni Decisamente User-friendly</title>
    <style>
      @media print {
        @page {
          size: A4 portrait;
          margin: 1cm;
        }
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        body {
          background-color: white !important;
        }
        /* Hide scrollbars in print to prevent ugly bars on PDF */
        ::-webkit-scrollbar {
          display: none !important;
        }
        /* Ensure inputs look like text */
        input, select, textarea {
          border: none !important;
          box-shadow: none !important;
          background: transparent !important;
          appearance: none !important;
        }
        /* Override all break settings to allow natural flow */
        div {
          page-break-inside: auto !important;
          page-break-before: auto !important;
          page-break-after: auto !important;
        }
        /* Header should not break from following content */
        .flex.items-center.gap-3 {
          page-break-after: avoid !important;
        }
        /* Rows should not break */
        tbody tr {
          page-break-inside: avoid !important;
        }
        /* Force page break for non-first branches */
        .print-page-break-before {
          page-break-before: always !important;
        }
        /* Force page break for RolesReport branches (non-first) */
        .print-branch-container:nth-of-type(n+2) {
          page-break-before: always !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
